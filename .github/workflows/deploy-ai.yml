name: Deploy AI Service to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'apps/ai-service/**'
      - '.github/workflows/deploy-ai.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Build and Deploy'
        run: |
          gcloud builds submit --tag gcr.io/${{ secrets.GCP_PROJECT_ID }}/tutorly-ai-service apps/ai-service/
          gcloud run deploy tutorly-ai-service \
            --image gcr.io/${{ secrets.GCP_PROJECT_ID }}/tutorly-ai-service \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --set-env-vars="SENTRY_DSN=${{ secrets.SENTRY_DSN }}"
